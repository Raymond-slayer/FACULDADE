<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Voz Segura</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://browser.sentry-cdn.com/7.57.0/bundle.min.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <div class="subtitulo">Criar Cadastro</div>
        <h1>Criar Sua Conta</h1>
        <p>Cadastre-se para acompanhar informacoes e registros com total sigilo.</p>
        
        <div class="grupo-campo">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" class="input" placeholder="Digite seu nome completo">
        </div>
        
        <div class="grupo-campo">
            <label for="email">E-mail</label>
            <input type="email" id="email" class="input" placeholder="Digite seu e-mail">
        </div>
        
        <div class="grupo-campo">
            <label for="senha">Senha</label>
            <input type="password" id="senha" class="input" placeholder="Crie uma senha forte">
        </div>
        
        <div class="grupo-campo">
            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" class="input" placeholder="(00) 00000-0000">
        </div>
        
        <button class="btn-principal" onclick="cadastrar()">Cadastrar</button>
        <button class="btn-secundario" onclick="voltar()">Voltar</button>
        
        <div class="footer">
            Seus dados sao armazenados de forma estritamente criptografada.
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
